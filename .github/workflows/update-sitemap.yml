name: Atualizar sitemap automaticamente

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: atualizar-sitemap
  cancel-in-progress: true

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Baixar os arquivos do site
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Gerar sitemap com os dados do Firebase
        run: node scripts/generate-sitemap.mjs

      - name: Publicar sitemap quando houver alteração
        shell: bash
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "O sitemap já está atualizado."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "Atualiza sitemap automaticamente"
          git push

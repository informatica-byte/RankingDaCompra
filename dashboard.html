<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Login</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .painel { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 650px; margin: 0 auto 30px auto; }
        h2 { text-align: center; border-bottom: 2px solid #ffe600; padding-bottom: 10px; margin-top:0; color: #2d3277;}
        
        .row { display: flex; gap: 15px; flex-wrap: wrap;}
        .col { flex: 1; min-width: 150px;}
        .campo { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; color: #444;}
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 14px;}
        
        .btn-salvar { width: 100%; background-color: #00a650; color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 16px; transition: 0.3s;}
        .btn-salvar:hover { background-color: #008a42;}
        .btn-categoria { background-color: #2d3277; }
        .btn-categoria:hover { background-color: #1a1e4d; }
        .btn-login { background-color: #3483fa; }
        .btn-login:hover { background-color: #2968c8; }
        .btn-sair { background-color: #f23d4f; margin-top: 20px;}
        
        .lista-admin { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;}
        .item-admin { display: flex; justify-content: space-between; padding: 12px; background: #f9f9f9; border: 1px solid #ddd; margin-bottom: 8px; border-radius: 6px; align-items: center; font-size: 14px;}
        .badge-cat { background: #ffe600; color: #333; padding: 4px 8px; border-radius: 4px; font-size: 11px; margin-right: 10px; font-weight: bold;}
        .btn-del { background: #f23d4f; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;}

        #admin-content { display: none; }
        #login-content { display: block; max-width: 400px; margin: 100px auto;}
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div class="painel" id="login-content">
        <h2>🔒 Acesso Restrito</h2>
        <form id="formLogin">
            <div class="campo">
                <label>E-mail (Criado no Firebase):</label>
                <input type="email" id="email" required>
            </div>
            <div class="campo">
                <label>Senha:</label>
                <input type="password" id="senha" required>
            </div>
            <button type="submit" class="btn-salvar btn-login">Entrar</button>
        </form>
    </div>

    <!-- DASHBOARD -->
    <div id="admin-content">
        
        <div class="painel">
            <h2>🏷️ Categorias</h2>
            <form id="formCategoria">
                <div class="row">
                    <div class="col campo">
                        <label>ID Único (ex: celulares):</label>
                        <input type="text" id="cat-id" required pattern="[a-zA-Z0-9_-]+">
                    </div>
                    <div class="col campo">
                        <label>Ícone (Emoji):</label>
                        <input type="text" id="cat-icone" placeholder="Ex: 📱" required>
                    </div>
                </div>
                <div class="campo">
                    <label>Nome Visível:</label>
                    <input type="text" id="cat-nome" placeholder="Ex: Celulares" required>
                </div>
                <button type="submit" class="btn-salvar btn-categoria">+ Criar Categoria</button>
            </form>
            <div class="lista-admin" id="lista-categorias-admin"></div>
        </div>

        <div class="painel">
            <h2>📦 Cadastro de Produto</h2>
            <form id="formProduto">
                <div class="row">
                    <div class="col campo">
                        <label>Categoria:</label>
                        <select id="categoria" required></select>
                    </div>
                    <div class="col campo">
                        <label>Selo de Destaque:</label>
                        <select id="selo">
                            <option value="">Sem selo</option>
                            <option value="👑 Melhor Escolha">👑 Melhor Escolha</option>
                            <option value="💰 Custo-Benefício">💰 Custo-Benefício</option>
                            <option value="🔥 Mais Vendido">🔥 Mais Vendido</option>
                        </select>
                    </div>
                </div>

                <div class="campo">
                    <label>Nome do Produto:</label>
                    <input type="text" id="titulo" required>
                </div>
                
                <div class="row">
                    <div class="col campo">
                        <label>Preço Estimado:</label>
                        <input type="text" id="preco" placeholder="Ex: 1.500,00">
                    </div>
                    <div class="col campo">
                        <label>Nota (1.0 a 5.0):</label>
                        <input type="number" id="nota" step="0.1" min="1" max="5" value="4.8" required>
                    </div>
                </div>

                <div class="campo">
                    <label>Link Mercado Livre (Afiliado):</label>
                    <input type="url" id="link" required>
                </div>

                <div class="campo">
                    <label>URL da Imagem:</label>
                    <input type="url" id="foto" required>
                </div>

                <div class="campo">
                    <label>Comentário / Resumo:</label>
                    <textarea id="comentario" rows="2" required></textarea>
                </div>

                <div class="row">
                    <div class="col campo">
                        <label>Prós (Separe por vírgula):</label>
                        <textarea id="pros" rows="2" placeholder="Ex: Boa câmera, bateria dura" required></textarea>
                    </div>
                    <div class="col campo">
                        <label>Contras (Separe por vírgula):</label>
                        <textarea id="contras" rows="2" placeholder="Ex: Não vem carregador" required></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-salvar">🚀 Salvar na Nuvem</button>
            </form>

            <div class="lista-admin">
                <h3>Produtos Cadastrados</h3>
                <div id="itens-lista"></div>
            </div>
            
            <button id="btn-sair" class="btn-salvar btn-sair">Sair do Sistema</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Suas chaves do Firebase (já inseridas)
        const firebaseConfig = {
            apiKey: "AIzaSyChRBmFfokCPpec7oTdC1u9obQg6M83Epk",
            authDomain: "rankingdacompra.firebaseapp.com",
            projectId: "rankingdacompra",
            storageBucket: "rankingdacompra.firebasestorage.app",
            messagingSenderId: "300637600463",
            appId: "1:300637600463:web:671c78dc47d5f8b39f15ba",
            measurementId: "G-NBKRX8TTR6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const loginContent = document.getElementById('login-content');
        const adminContent = document.getElementById('admin-content');

        auth.onAuthStateChanged(user => {
            if (user) {
                loginContent.style.display = 'none';
                adminContent.style.display = 'block';
                carregarCategorias();
                carregarProdutos();
            } else {
                loginContent.style.display = 'block';
                adminContent.style.display = 'none';
            }
        });

        document.getElementById('formLogin').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            auth.signInWithEmailAndPassword(email, senha).catch(error => alert("Erro: " + error.message));
        });

        document.getElementById('btn-sair').addEventListener('click', () => {
            auth.signOut();
        });

        // Controle de Categorias
        function carregarCategorias() {
            let categorias = JSON.parse(localStorage.getItem('minhasCategorias')) || [
                { id: 'celulares', icone: '📱', nome: 'Celulares' },
                { id: 'tvs', icone: '📺', nome: 'TVs e Telas' },
                { id: 'som', icone: '🎧', nome: 'Áudio' }
            ];
            
            const select = document.getElementById('categoria');
            select.innerHTML = '';
            categorias.forEach(cat => { select.innerHTML += `<option value="${cat.id}">${cat.icone} ${cat.nome}</option>`; });

            const listaCatAdmin = document.getElementById('lista-categorias-admin');
            listaCatAdmin.innerHTML = '';
            categorias.forEach((cat, index) => {
                listaCatAdmin.innerHTML += `<div class="item-admin"><span>${cat.icone} <b>${cat.nome}</b></span> <button class="btn-del" onclick="deletarCategoria(${index})">X</button></div>`;
            });
        }

        document.getElementById('formCategoria').addEventListener('submit', function(e) {
            e.preventDefault();
            const novaCat = {
                id: document.getElementById('cat-id').value.toLowerCase().replace(/\s+/g, ''),
                icone: document.getElementById('cat-icone').value,
                nome: document.getElementById('cat-nome').value
            };
            let categorias = JSON.parse(localStorage.getItem('minhasCategorias')) || [
                { id: 'celulares', icone: '📱', nome: 'Celulares' },
                { id: 'tvs', icone: '📺', nome: 'TVs e Telas' },
                { id: 'som', icone: '🎧', nome: 'Áudio' }
            ];
            if(categorias.some(c => c.id === novaCat.id)) return alert("ID já existe!");
            categorias.push(novaCat);
            localStorage.setItem('minhasCategorias', JSON.stringify(categorias));
            this.reset();
            carregarCategorias();
        });

        function deletarCategoria(index) {
            let categorias = JSON.parse(localStorage.getItem('minhasCategorias'));
            categorias.splice(index, 1);
            localStorage.setItem('minhasCategorias', JSON.stringify(categorias));
            carregarCategorias();
        }

        // Controle de Produtos no Firebase
        document.getElementById('formProduto').addEventListener('submit', (e) => {
            e.preventDefault();
            const novoProduto = {
                categoria: document.getElementById('categoria').value,
                titulo: document.getElementById('titulo').value,
                link: document.getElementById('link').value,
                selo: document.getElementById('selo').value,
                foto: document.getElementById('foto').value,
                comentario: document.getElementById('comentario').value,
                preco: document.getElementById('preco').value,
                nota: document.getElementById('nota').value,
                pros: document.getElementById('pros').value,
                contras: document.getElementById('contras').value,
                dataCadastro: firebase.firestore.FieldValue.serverTimestamp()
            };

            db.collection("produtos").add(novoProduto)
                .then(() => {
                    alert('Salvo na nuvem!');
                    document.getElementById('formProduto').reset();
                    document.getElementById('nota').value = "4.8";
                })
                .catch(error => alert("Erro ao salvar: " + error.message));
        });

        function carregarProdutos() {
            db.collection("produtos").orderBy("dataCadastro", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('itens-lista');
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const prod = doc.data();
                    container.innerHTML += `
                        <div class="item-admin">
                            <div><span class="badge-cat">${prod.categoria}</span>${prod.titulo}</div>
                            <button class="btn-del" onclick="deletarProduto('${doc.id}')">X</button>
                        </div>
                    `;
                });
            });
        }

        function deletarProduto(id) {
            if(confirm("Apagar este produto da nuvem?")) {
                db.collection("produtos").doc(id).delete();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Login</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .painel { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 650px; margin: 0 auto 30px auto; }
        h2 { text-align: center; border-bottom: 2px solid #ffe600; padding-bottom: 10px; margin-top:0; color: #2d3277;}
        
        .row { display: flex; gap: 15px; flex-wrap: wrap;}
        .col { flex: 1; min-width: 150px;}
        .campo { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; color: #444;}
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 14px;}
        
        .btn-salvar { width: 100%; background-color: #00a650; color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 16px; transition: 0.3s;}
        .btn-salvar:hover { background-color: #008a42;}
        .btn-categoria { background-color: #2d3277; }
        .btn-categoria:hover { background-color: #1a1e4d; }
        .btn-login { background-color: #3483fa; }
        .btn-sair { background-color: #f23d4f; margin-top: 20px;}
        
        /* Botão Magico do ML */
        .btn-magico { background-color: #ffe600; color: #2d3277; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: 5px; display: inline-block; width: 100%;}
        .btn-magico:hover { background-color: #e6cf00; }
        
        /* Caixas de Destaque */
        .caixa-amarela { background: #fff3cd; border: 2px dashed #ffe600; padding: 15px; border-radius: 8px; margin-bottom: 15px;}
        .caixa-azul { background: #e6f0ff; border: 2px dashed #3483fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;}
        
        .lista-admin { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;}
        .item-admin { display: flex; justify-content: space-between; padding: 12px; background: #f9f9f9; border: 1px solid #ddd; margin-bottom: 8px; border-radius: 6px; align-items: center; font-size: 14px;}
        .cat-miniatura { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; vertical-align: middle; margin-right: 8px; border: 1px solid #ddd; background: #fff; }
        .ajuda-categoria { margin: -7px 0 12px; color: #666; font-size: 12px; }
        .badge-cat { background: #ffe600; color: #333; padding: 4px 8px; border-radius: 4px; font-size: 11px; margin-right: 10px; font-weight: bold;}
        .acoes { display: flex; gap: 8px; }
        .btn-edit { background: #ffc107; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .btn-del { background: #f23d4f; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;}

        #admin-content { display: none; }
        #login-content { display: block; max-width: 400px; margin: 100px auto;}
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div class="painel" id="login-content">
        <h2>🔒 Acesso Restrito</h2>
        <form id="formLogin">
            <div class="campo"><label>E-mail:</label><input type="email" id="email" required></div>
            <div class="campo"><label>Senha:</label><input type="password" id="senha" required></div>
            <button type="submit" class="btn-salvar btn-login">Entrar</button>
        </form>
    </div>

    <!-- DASHBOARD -->
    <div id="admin-content">

        <div class="painel">
            <h2>🏷️ Categorias</h2>
            <form id="formCategoria">
                <div class="row">
                    <div class="col campo"><label>ID Único (URL):</label><input type="text" id="cat-id" required pattern="[a-zA-Z0-9_-]+"></div>
                    <div class="col campo"><label>Ícone de reserva (opcional):</label><input type="text" id="cat-icone" placeholder="Ex.: 📱"></div>
                </div>
                <div class="campo"><label>Nome Visível:</label><input type="text" id="cat-nome" required></div>
                <div class="campo"><label>URL da imagem da categoria (opcional):</label><input type="url" id="cat-imagem" placeholder="https://site.com/imagem-da-categoria.jpg"></div>
                <p class="ajuda-categoria">Cole o link direto de uma imagem (JPG, PNG ou WEBP). A imagem aparecerá no card; sem imagem, será usado o ícone de reserva.</p>
                <button type="submit" id="btn-submit-cat" class="btn-salvar btn-categoria">+ Criar Categoria</button>
            </form>
            <div class="lista-admin" id="lista-categorias-admin"></div>
        </div>

        <div class="painel">
            <h2>📦 Cadastro de Produto</h2>
            <form id="formProduto">
                
                <div class="campo caixa-amarela">
                    <label>1. Cole o Link COMUM do Produto (Para o sistema achar a foto):</label>
                    <input type="url" id="link" placeholder="Ex: https://produto.mercadolivre.com.br/MLB-1234..." required>
                    <button type="button" id="btn-magico" class="btn-magico" onclick="buscarDadosML()">✨ 1º Passo: Buscar e Preencher com IA</button>
                </div>

                <div class="campo caixa-azul">
                    <label style="color:#2968c8;">🔗 <b>2. Link de Afiliado (MUITO IMPORTANTE):</b></label>
                    <input type="url" id="linkAfiliado" placeholder="Cole seu link de parceiro aqui. O cliente clicará nele!" required>
                    <span style="font-size:11px; color:#555;">Este é o link que vai para o botão "Ver Oferta" do site.</span>
                </div>

                <div class="caixa-azul">
                    <label style="color:#2968c8;">🤖 3. Cole a resposta da Inteligência Artificial aqui:</label>
                    <textarea id="texto-ia-paste" rows="3" placeholder='Cole o código JSON gerado pelo Gemini' oninput="distribuirIA()"></textarea>
                </div>

                <div class="row">
                    <div class="col campo"><label>Categoria:</label><select id="categoria" required></select></div>
                    <div class="col campo">
                        <label>Selo de Destaque:</label>
                        <select id="selo">
                            <option value="">Sem selo</option>
                            <option value="👑 Melhor Escolha">👑 Melhor Escolha</option>
                            <option value="💰 Custo-Benefício">💰 Custo-Benefício</option>
                            <option value="🔥 Mais Vendido">🔥 Mais Vendido</option>
                        </select>
                    </div>
                </div>

                <div class="campo"><label>Nome do Produto:</label><input type="text" id="titulo" required></div>
                <div class="row">
                    <div class="col campo"><label>Preço Estimado:</label><input type="text" id="preco"></div>
                    <div class="col campo"><label>Nota (1.0 a 5.0):</label><input type="number" id="nota" step="0.1" min="1" max="5" value="4.8" required></div>
                    <div class="col campo"><label>Posição no ranking:</label><input type="number" id="ranking" min="1" max="10" value="10" required></div>
                </div>

                <div class="campo"><label>URL da Imagem:</label><input type="url" id="foto" required></div>
                <div class="campo"><label>Resumo Persuasivo (máximo de 500 caracteres):</label><textarea id="comentario" rows="3" maxlength="500" required></textarea></div>
                
                <div class="row">
                    <div class="col campo"><label>Pontos positivos (máximo de 300 caracteres):</label><textarea id="pros" rows="3" maxlength="300" required></textarea></div>
                    <div class="col campo"><label>Pontos de atenção (máximo de 300 caracteres):</label><textarea id="contras" rows="3" maxlength="300" required></textarea></div>
                </div>

                <button type="submit" id="btn-submit-prod" class="btn-salvar">🚀 Salvar na Nuvem</button>
            </form>

            <div class="lista-admin">
                <h3>Produtos Cadastrados</h3>
                <div id="itens-lista"></div>
            </div>
            
            <button id="btn-sair" class="btn-salvar btn-sair">Sair do Sistema</button>
        </div>
    </div>

    <!-- SDKs do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Firebase AI Logic + App Check: a chave do Gemini fica protegida no Firebase. -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { initializeAppCheck, ReCaptchaEnterpriseProvider } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app-check.js";
        import { getAI, getGenerativeModel, GoogleAIBackend } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-ai.js";

        const firebaseConfigAI = {
            apiKey: "AIzaSyChRBmFfokCPPec7oTdC1u9obQg6M83Epk",
            authDomain: "rankingdacompra.firebaseapp.com",
            projectId: "rankingdacompra",
            storageBucket: "rankingdacompra.firebasestorage.app",
            messagingSenderId: "300637600463",
            appId: "1:300637600463:web:671c78dc47d5f8b39f15ba"
        };

        const aiApp = initializeApp(firebaseConfigAI, "ai-logic");
        initializeAppCheck(aiApp, {
            provider: new ReCaptchaEnterpriseProvider("6LeNOlUtAAAAAOHg_j1l5d7AkzLGnxNF6LszSoOp"),
            isTokenAutoRefreshEnabled: true
        });

        const ai = getAI(aiApp, { backend: new GoogleAIBackend() });
        // Modelo leve para reduzir recusas temporárias por alta demanda.
        const model = getGenerativeModel(ai, { model: "gemini-3.1-flash-lite" });

        function textoUtil(valor) {
            const texto = String(valor || "").trim();
            return texto && !/(n\/?a|informações insuficientes|dados técnicos ausentes|produto sem especificações|dados ausentes)/i.test(texto) ? texto : "";
        }

        function limitarTexto(valor, limite) {
            const texto = String(valor || "").replace(/\s+/g, " ").trim();
            if (texto.length <= limite) return texto;
            const corte = texto.slice(0, limite - 1).replace(/\s+\S*$/, "").trim();
            return `${corte}…`;
        }

        function listaUtil(valor, alternativas) {
            const itens = String(valor || "").split(",")
                .map(item => item.trim())
                .filter(item => item && !/(n\/?a|informações insuficientes|dados técnicos ausentes|dados ausentes)/i.test(item));
            return limitarTexto(itens.length ? itens.join(", ") : alternativas.join(", "), 300);
        }

        function normalizarSugestaoIA(resposta, produto, categorias) {
            const categoriaValida = categorias.some(categoria => categoria.id === resposta.categoria)
                ? resposta.categoria
                : (categorias[0]?.id || "");
            const titulo = produto.titulo || textoUtil(resposta.titulo) || "Produto selecionado";
            const especificacoes = Array.isArray(produto.especificacoes) ? produto.especificacoes.slice(0, 3) : [];
            const dadosTecnicos = especificacoes.length
                ? especificacoes.join(", ")
                : "os recursos descritos no próprio título do anúncio";
            const resumoPadrao = `O ${titulo} chama atenção por ${dadosTecnicos}. Na comparação com opções mais básicas da categoria, o conjunto anunciado tende a ser mais interessante para quem prioriza esses recursos; ainda assim, confirme autonomia, garantia e itens inclusos antes de fechar a compra.`;

            return {
                categoria: categoriaValida,
                selo: ["", "🏆 Melhor Escolha", "💰 Custo-Benefício", "🔥 Mais Vendido"].includes(resposta.selo) ? resposta.selo : "",
                titulo,
                preco: produto.preco || "",
                nota: Number.isFinite(Number(resposta.nota)) ? Math.min(5, Math.max(1, Number(resposta.nota))) : 4.5,
                ranking: Number.isFinite(Number.parseInt(resposta.ranking, 10)) ? Math.min(10, Math.max(1, Number.parseInt(resposta.ranking, 10))) : 10,
                comentario: limitarTexto(textoUtil(resposta.comentario) || resumoPadrao, 500),
                pros: listaUtil(resposta.pros, especificacoes.length ? especificacoes.map(item => `Destaque no anúncio: ${item}`) : ["Produto identificado no anúncio", "Informações principais disponíveis", "Oferta para comparar na categoria"]),
                contras: listaUtil(resposta.contras, ["Conferir ficha técnica completa", "Verificar garantia e acessórios inclusos"])
            };
        }

        window.preencherComIA = async ({ produto, categorias }) => {
            const categoriasPermitidas = categorias.map(categoria => `${categoria.id}: ${categoria.nome}`).join("; ");
            const especificacoes = Array.isArray(produto.especificacoes) && produto.especificacoes.length
                ? produto.especificacoes.join(" | ")
                : "nenhuma especificação adicional disponível";
            const prompt = `Você é um especialista brasileiro em análise técnica de produtos e comparativos de compra. Gere um cadastro humano, específico e pronto para publicação no site Ranking da Compra.

Escreva como alguém que testaria e compararia o produto com alternativas da mesma categoria. A análise deve usar linguagem técnica simples, realista e útil. Compare implicitamente com modelos de entrada ou da mesma faixa, mas NÃO cite concorrentes, preços ou especificações que não foram fornecidos.

DADOS CONFIÁVEIS: use somente o título, preço, descrição e especificações enviados pelo anúncio do Mercado Livre. Não invente bateria, tela, processador, garantia, desempenho, acessórios, defeitos ou avaliações.

REGRAS OBRIGATÓRIAS:
- Mantenha o nome do produto fiel ao título do anúncio; nunca troque por termos genéricos como "Smartphone Genérico".
- O resumo deve ter entre 250 e 500 caracteres, em 2 ou 3 frases. Diga para qual perfil o produto parece indicado, explique os diferenciais e compare de modo equilibrado com opções mais básicas da categoria.
- Os pontos positivos devem ter entre 120 e 300 caracteres no total, com 3 pontos curtos separados por vírgula. Cada ponto precisa usar uma especificação real do título, descrição ou atributos.
- Os pontos de atenção devem ter entre 100 e 300 caracteres no total, com 2 ou 3 cuidados honestos separados por vírgula. Aponte limites técnicos esperados ou verificações importantes; nunca invente defeitos.
- Quando só houver título, extraia dele todos os dados técnicos explícitos (ex.: potência, capacidade, memória, câmera, suspensão, conectividade). Faça inferências apenas quando usar expressões prudentes como "tende a" ou "é mais indicado para".
- Nunca escreva "Conheça este produto", "informações insuficientes", "dados ausentes", "N/A", "produto genérico" ou "verifique o anúncio" como texto principal.
- A categoria precisa ser exatamente um dos IDs permitidos.
- Retorne somente JSON válido, sem markdown.

Título original do produto: ${produto.titulo || "não informado"}
Preço encontrado: ${produto.preco || "não informado"}
Descrição do vendedor: ${(produto.descricao || "sem descrição disponibilizada pelo anúncio").slice(0, 1800)}
Especificações técnicas do anúncio: ${especificacoes}
Categorias permitidas: ${categoriasPermitidas}
Selos permitidos: "", "🏆 Melhor Escolha", "💰 Custo-Benefício", "🔥 Mais Vendido"

Formato obrigatório:
{
  "categoria": "id de categoria permitida",
  "selo": "selo permitido ou vazio",
  "titulo": "repita o título original de forma fiel",
  "nota": 4.5,
  "ranking": 10,
  "comentario": "resumo técnico, comparativo e humano com no máximo 500 caracteres",
  "pros": "três pontos concretos separados por vírgula, com no máximo 300 caracteres",
  "contras": "dois ou três pontos de atenção separados por vírgula, com no máximo 300 caracteres"
}`;

            const result = await model.generateContent(prompt);
            const texto = result.response.text().trim().replace(/^\`\`\`json\s*/i, "").replace(/^\`\`\`\s*/i, "").replace(/\s*\`\`\`$/, "");
            return normalizarSugestaoIA(JSON.parse(texto), produto, categorias);
        };
    </script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyChRBmFfokCPPec7oTdC1u9obQg6M83Epk",
            authDomain: "rankingdacompra.firebaseapp.com",
            projectId: "rankingdacompra",
            storageBucket: "rankingdacompra.firebasestorage.app",
            messagingSenderId: "300637600463",
            appId: "1:300637600463:web:671c78dc47d5f8b39f15ba",
            measurementId: "G-NBKRX8TTR6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const loginContent = document.getElementById('login-content');
        const adminContent = document.getElementById('admin-content');
        let editProdId = null;
        let editandoCatId = null;

        // Evita que texto salvo (título, nome de categoria...) vire HTML/JS ao ser exibido
        function escapeHtml(texto) {
            if (texto === undefined || texto === null) return '';
            return String(texto)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                loginContent.style.display = 'none';
                adminContent.style.display = 'block';
                migrarCategoriasAntigasSeNecessario().then(() => {
                    carregarCategorias();
                    carregarProdutos();
                });
            } else {
                loginContent.style.display = 'block';
                adminContent.style.display = 'none';
            }
        });

        document.getElementById('formLogin').addEventListener('submit', (e) => {
            e.preventDefault();
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('senha').value)
                .catch(error => alert("Erro: " + error.message));
        });

        document.getElementById('btn-sair').addEventListener('click', () => auth.signOut());

        // MIGRAÇÃO: se este navegador ainda tiver categorias salvas do jeito antigo
        // (localStorage) e a nuvem estiver vazia, copia elas pro Firestore uma única vez,
        // assim elas passam a aparecer pra todo mundo, não só neste computador.
        async function migrarCategoriasAntigasSeNecessario() {
            try {
                const antigas = JSON.parse(localStorage.getItem('minhasCategorias') || 'null');
                if (!antigas || !antigas.length) return;

                const snapshot = await db.collection("categorias").limit(1).get();
                if (!snapshot.empty) return; // já existem categorias na nuvem, não mexe

                for (const cat of antigas) {
                    if (!cat.id) continue;
                    await db.collection("categorias").doc(cat.id).set({
                        icone: cat.icone || '',
                        nome: cat.nome || cat.id,
                        criadoEm: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                localStorage.removeItem('minhasCategorias');
                console.log('Categorias antigas migradas para o Firestore.');
            } catch (e) {
                console.error('Falha ao migrar categorias antigas:', e);
            }
        }

        async function buscarDadosML() {
            const url = document.getElementById('link').value;
            if (!url) return alert("Por favor, cole o link comum do Mercado Livre primeiro.");

            // Em links de catálogo há dois códigos: o da página (/p/MLB...) e
            // o do anúncio real (item_id ou wid). O anúncio real traz preço e foto,
            // portanto ele sempre tem prioridade.
            let codigoAnuncio = '';
            try {
                const urlML = new URL(url);
                const localizarMLB = valor => String(valor || '').match(/\bMLB[-_]?\d+\b/i)?.[0] || '';
                codigoAnuncio = localizarMLB(urlML.searchParams.get('item_id'))
                    || localizarMLB(urlML.searchParams.get('wid'))
                    || localizarMLB(urlML.searchParams.get('pdp_filters'))
                    || localizarMLB(urlML.hash);
            } catch (e) {}

            // O Mercado Livre usa vários códigos: MLB (anúncio), MLE (catálogo),
            // MLU, MLA etc. Links de catálogo, como /p/MLE..., também são válidos.
            const match = codigoAnuncio ? [codigoAnuncio] : url.match(/\bML[A-Z]{1,3}[-_]?\d+\b/i);
            if (!match) return alert("Não encontrei um código Mercado Livre no link. Cole o link completo do produto, que contenha algo como MLB123... ou MLE123...");

            const idML = match[0].replace(/[-_]/g, '');
            const btn = document.getElementById('btn-magico');
            btn.innerText = "⏳ Puxando dados...";

            try {
                let tituloML = '', precoML = '', fotoUrl = '', descText = '', especificacoes = [];
                const usarDadosDoItem = (item) => {
                    if (!item || item.error || !item.title) return false;
                    tituloML = item.title || '';
                    const preco = item.price || item.base_price || null;
                    precoML = preco ? Number(preco).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) : precoML;
                    const foto = item.pictures?.[0] || {};
                    fotoUrl = foto.secure_url || foto.url || foto.source || item.thumbnail || fotoUrl;
                    especificacoes = (item.attributes || [])
                        .filter(atributo => atributo && atributo.name && atributo.value_name)
                        .slice(0, 18)
                        .map(atributo => `${atributo.name}: ${atributo.value_name}`);
                    return true;
                };

                let resItem = await fetch(`https://api.mercadolibre.com/items/${idML}`);
                let dataItem = await resItem.json().catch(() => ({ error: true }));

                if (!dataItem.error) {
                    usarDadosDoItem(dataItem);
                    try {
                        let resDesc = await fetch(`https://api.mercadolibre.com/items/${idML}/description`);
                        let dataDesc = await resDesc.json();
                        descText = dataDesc.plain_text || dataDesc.text || "";
                    } catch(e) {}
                } else {
                    let resProd = await fetch(`https://api.mercadolibre.com/products/${idML}`);
                    let dataProd = await resProd.json().catch(() => ({ error: true }));
                    if (!dataProd.error) {
                        tituloML = dataProd.name || dataProd.title || '';
                        const precoCatalogo = dataProd.buy_box_winner?.price || dataProd.price || null;
                        precoML = precoCatalogo ? Number(precoCatalogo).toLocaleString('pt-BR', {minimumFractionDigits: 2}) : '';
                        const primeiraFoto = dataProd.pictures?.[0] || {};
                        fotoUrl = primeiraFoto.secure_url || primeiraFoto.url || primeiraFoto.source || '';
                        descText = dataProd.short_description || dataProd.description || '';
                        especificacoes = (dataProd.attributes || [])
                            .filter(atributo => atributo && atributo.name && atributo.value_name)
                            .slice(0, 18)
                            .map(atributo => `${atributo.name}: ${atributo.value_name}`);
                    }
                }

                // Alguns links /p/MLE... são páginas de catálogo e não um anúncio.
                // Primeiro, procura uma oferta pública vinculada ao catálogo.
                if (!tituloML) {
                    try {
                        const resOfertas = await fetch(`https://api.mercadolibre.com/products/${idML}/items`);
                        const dadosOfertas = await resOfertas.json().catch(() => ({}));
                        const ofertas = Array.isArray(dadosOfertas) ? dadosOfertas : (dadosOfertas.results || dadosOfertas.items || []);
                        const codigoItem = ofertas.find(oferta => oferta?.id || oferta?.item_id)?.id || ofertas.find(oferta => oferta?.item_id)?.item_id;
                        if (codigoItem) {
                            const resOferta = await fetch(`https://api.mercadolibre.com/items/${codigoItem}`);
                            usarDadosDoItem(await resOferta.json().catch(() => ({})));
                        }
                    } catch (e) {
                        console.warn('Não foi possível consultar ofertas do catálogo.', e);
                    }
                }

                // Última alternativa: pesquisa pública pelo nome existente na URL.
                // Isso cobre links de catálogo que não expõem uma oferta diretamente.
                if (!tituloML) {
                    try {
                        const caminho = new URL(url).pathname.split('/p/')[0];
                        const slug = caminho.split('/').filter(Boolean).pop() || '';
                        const busca = slug.replace(/[-_]+/g, ' ').trim();
                        if (busca.length >= 8) {
                            const resBusca = await fetch(`https://api.mercadolibre.com/sites/MLB/search?limit=5&q=${encodeURIComponent(busca)}`);
                            const dadosBusca = await resBusca.json().catch(() => ({}));
                            const candidato = (dadosBusca.results || []).find(resultado => resultado?.id && resultado?.title);
                            if (candidato) {
                                const resDetalhe = await fetch(`https://api.mercadolibre.com/items/${candidato.id}`);
                                const detalhe = await resDetalhe.json().catch(() => candidato);
                                usarDadosDoItem(detalhe.error ? candidato : detalhe);
                            }
                        }
                    } catch (e) {
                        console.warn('Não foi possível pesquisar o produto pelo nome.', e);
                    }
                }

                // Não chama a IA sem produto identificado: isso evita o texto genérico
                // "não informado" que aparecia quando o código do link não era lido.
                if (!tituloML) {
                    return alert("O Mercado Livre não retornou os dados deste link. Tente abrir o anúncio e copiar novamente a URL completa da barra do navegador.");
                }

                document.getElementById('titulo').value = tituloML || '';
                document.getElementById('preco').value = precoML || '';
                document.getElementById('foto').value = fotoUrl ? fotoUrl.replace('-I.jpg', '-O.jpg') : '';

                try {
                    if (typeof window.preencherComIA !== 'function') {
                        throw new Error('A integração da IA ainda está carregando. Aguarde alguns segundos e tente novamente.');
                    }

                    btn.innerText = "✨ Gerando conteúdo com IA...";
                    const categorias = Array.from(document.getElementById('categoria').options)
                        .map(option => ({ id: option.value, nome: option.textContent.trim() }));
                    const sugestao = await window.preencherComIA({
                        produto: {
                            titulo: tituloML,
                            preco: precoML,
                            foto: fotoUrl,
                            descricao: descText,
                            especificacoes
                        },
                        categorias
                    });
                    aplicarSugestaoIA(sugestao);
                    alert("✅ Dados do Mercado Livre e sugestões da IA preenchidos! Revise as informações antes de salvar.");
                } catch (erroIA) {
                    console.error('Erro ao gerar conteúdo com IA:', erroIA);
                    alert("Os dados do Mercado Livre foram preenchidos, mas a IA não respondeu. Tente novamente em instantes.\n\nDetalhe: " + erroIA.message);
                }

            } catch (error) {
                alert("Erro ao buscar no Mercado Livre.");
            } finally {
                btn.innerText = "✨ 1º Passo: Buscar e Preencher com IA";
            }
        }

        function aplicarSugestaoIA(sugestao) {
            const texto = valor => typeof valor === 'string' ? valor.trim() : '';
            const preencher = (id, valor) => {
                const campo = document.getElementById(id);
                if (campo && texto(valor)) campo.value = texto(valor);
            };

            const categoria = document.getElementById('categoria');
            if (texto(sugestao.categoria) && Array.from(categoria.options).some(option => option.value === sugestao.categoria)) {
                categoria.value = sugestao.categoria;
            }

            const selo = document.getElementById('selo');
            if (Array.from(selo.options).some(option => option.value === sugestao.selo)) {
                selo.value = sugestao.selo;
            }

            preencher('titulo', sugestao.titulo);
            // O preço vem diretamente do Mercado Livre e nunca é alterado pela IA.
            preencher('comentario', sugestao.comentario);
            preencher('pros', sugestao.pros);
            preencher('contras', sugestao.contras);

            const nota = Number(sugestao.nota);
            if (Number.isFinite(nota)) document.getElementById('nota').value = Math.min(5, Math.max(1, nota)).toFixed(1);

            const ranking = Number.parseInt(sugestao.ranking, 10);
            if (Number.isFinite(ranking)) document.getElementById('ranking').value = Math.min(10, Math.max(1, ranking));

            document.getElementById('texto-ia-paste').value = JSON.stringify(sugestao, null, 2);
            document.getElementById('texto-ia-paste').style.borderColor = '#00a650';
        }

        function distribuirIA() {
            try {
                const texto = document.getElementById('texto-ia-paste').value.replace(/```json/g, '').replace(/```/g, '').trim();
                const json = JSON.parse(texto);
                
                if(json.comentario) document.getElementById('comentario').value = json.comentario;
                if(json.pros) document.getElementById('pros').value = json.pros;
                if(json.contras) document.getElementById('contras').value = json.contras;
                
                document.getElementById('texto-ia-paste').style.borderColor = "#00a650";
            } catch (e) {
                // Aguardando colar corretamente
            }
        }

        // Categorias agora ficam na nuvem (Firestore), com o campo "ID Único"
        // sendo usado como o próprio ID do documento. Isso garante que o site
        // público (index.html) enxergue exatamente as mesmas categorias.
        function carregarCategorias() {
            db.collection("categorias").orderBy("criadoEm", "asc").onSnapshot(snapshot => {
                const select = document.getElementById('categoria');
                const listaCatAdmin = document.getElementById('lista-categorias-admin');
                const categoriaSelecionada = select.value;
                select.innerHTML = '';
                listaCatAdmin.innerHTML = '';

                snapshot.forEach(doc => {
                    const cat = doc.data();
                    const icone = cat.icone ? `${escapeHtml(cat.icone)} ` : '';
                    const miniatura = cat.imagem ? `<img class="cat-miniatura" src="${escapeHtml(cat.imagem)}" alt="">` : '';
                    select.innerHTML += `<option value="${doc.id}">${icone}${escapeHtml(cat.nome)}</option>`;
                    listaCatAdmin.innerHTML += `
                        <div class="item-admin">
                            <span>${miniatura}${icone}<b>${escapeHtml(cat.nome)}</b> <small style="color:#999;">(${escapeHtml(doc.id)})</small></span>
                            <div class="acoes">
                                <button type="button" class="btn-edit" onclick="editarCategoria('${doc.id}')">✎</button>
                                <button type="button" class="btn-del" onclick="deletarCategoria('${doc.id}')">X</button>
                            </div>
                        </div>`;
                });

                // Mantém a categoria selecionada no formulário de produto, se ainda existir
                if (categoriaSelecionada) select.value = categoriaSelecionada;
            }, error => {
                console.error(error);
                alert('Erro ao carregar categorias: ' + error.message);
            });
        }

        document.getElementById('formCategoria').addEventListener('submit', async function(e) {
            e.preventDefault();
            const idDigitado = document.getElementById('cat-id').value.trim().toLowerCase().replace(/\s+/g, '');
            const catInfo = {
                icone: document.getElementById('cat-icone').value.trim(),
                nome: document.getElementById('cat-nome').value.trim(),
                imagem: document.getElementById('cat-imagem').value.trim()
            };

            try {
                if (editandoCatId !== null) {
                    // Edição: só nome/ícone mudam, o ID (slug da URL) não muda
                    await db.collection("categorias").doc(editandoCatId).update(catInfo);
                    editandoCatId = null;
                    document.getElementById('cat-id').disabled = false;
                    document.getElementById('btn-submit-cat').innerText = "+ Criar Categoria";
                } else {
                    const docRef = db.collection("categorias").doc(idDigitado);
                    const existe = await docRef.get();
                    if (existe.exists) return alert("ID já existe!");

                    catInfo.criadoEm = firebase.firestore.FieldValue.serverTimestamp();
                    await docRef.set(catInfo);
                }
                this.reset();
            } catch (error) {
                alert("Erro ao salvar categoria: " + error.message);
            }
        });

        function editarCategoria(id) {
            db.collection("categorias").doc(id).get().then(doc => {
                if (!doc.exists) return;
                const cat = doc.data();
                document.getElementById('cat-id').value = id;
                document.getElementById('cat-id').disabled = true;
                document.getElementById('cat-icone').value = cat.icone || '';
                document.getElementById('cat-nome').value = cat.nome;
                document.getElementById('cat-imagem').value = cat.imagem || '';
                editandoCatId = id;
                document.getElementById('btn-submit-cat').innerText = "💾 Salvar Edição";
                window.scrollTo(0, 200);
            });
        }

        async function deletarCategoria(id) {
            try {
                const produtosVinculados = await db.collection("produtos").where("categoria", "==", id).limit(1).get();
                if (!produtosVinculados.empty) {
                    alert("Não é possível apagar esta categoria enquanto houver produtos vinculados a ela.");
                    return;
                }
            } catch (error) {
                alert("Erro ao verificar os produtos da categoria: " + error.message);
                return;
            }
            if(confirm("Deseja apagar esta categoria? Os produtos já cadastrados nela não serão apagados, mas ficarão sem categoria visível.")) {
                db.collection("categorias").doc(id).delete()
                    .catch(error => alert("Erro ao apagar categoria: " + error.message));
            }
        }

        document.getElementById('formProduto').addEventListener('submit', (e) => {
            e.preventDefault();
            const dadosProduto = {
                categoria: document.getElementById('categoria').value,
                titulo: document.getElementById('titulo').value,
                link: document.getElementById('link').value,
                linkAfiliado: document.getElementById('linkAfiliado').value, // NOVO CAMPO SALVO NO BANCO!
                selo: document.getElementById('selo').value,
                foto: document.getElementById('foto').value,
                comentario: document.getElementById('comentario').value,
                preco: document.getElementById('preco').value,
                nota: parseFloat(document.getElementById('nota').value),
                ranking: parseInt(document.getElementById('ranking').value, 10),
                pros: document.getElementById('pros').value,
                contras: document.getElementById('contras').value
            };

            if (editProdId !== null) {
                db.collection("produtos").doc(editProdId).update(dadosProduto)
                    .then(() => { alert('Atualizado!'); resetarFormProduto(); })
                    .catch(error => alert("Erro: " + error.message));
            } else {
                dadosProduto.dataCadastro = firebase.firestore.FieldValue.serverTimestamp();
                db.collection("produtos").add(dadosProduto)
                    .then(() => { alert('Salvo!'); resetarFormProduto(); })
                    .catch(error => alert("Erro: " + error.message));
            }
        });

        function resetarFormProduto() {
            document.getElementById('formProduto').reset();
            document.getElementById('nota').value = "4.8";
            document.getElementById('ranking').value = "10";
            document.getElementById('texto-ia-paste').value = '';
            document.getElementById('texto-ia-paste').style.borderColor = "#3483fa";
            editProdId = null;
            document.getElementById('btn-submit-prod').innerText = "🚀 Salvar na Nuvem";
        }

        function carregarProdutos() {
            db.collection("produtos").orderBy("dataCadastro", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('itens-lista');
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const prod = doc.data();
                    container.innerHTML += `
                        <div class="item-admin">
                            <div><span class="badge-cat">${escapeHtml(prod.categoria)}</span>${escapeHtml(prod.titulo)}</div>
                            <div class="acoes">
                                <button type="button" class="btn-edit" onclick="editarProduto('${doc.id}')">✎</button>
                                <button type="button" class="btn-del" onclick="deletarProduto('${doc.id}')">X</button>
                            </div>
                        </div>
                    `;
                });
            }, error => {
                console.error(error);
                alert('Erro ao carregar produtos: ' + error.message);
            });
        }

        function editarProduto(id) {
            db.collection("produtos").doc(id).get().then(doc => {
                if (doc.exists) {
                    const prod = doc.data();
                    document.getElementById('categoria').value = prod.categoria;
                    document.getElementById('selo').value = prod.selo || "";
                    document.getElementById('titulo').value = prod.titulo;
                    document.getElementById('preco').value = prod.preco || "";
                    document.getElementById('nota').value = prod.nota || "4.8";
                    document.getElementById('ranking').value = prod.ranking || "10";
                    document.getElementById('link').value = prod.link;
                    document.getElementById('linkAfiliado').value = prod.linkAfiliado || ""; // PUXANDO LINK DE AFILIADO
                    document.getElementById('foto').value = prod.foto;
                    document.getElementById('comentario').value = prod.comentario;
                    document.getElementById('pros').value = prod.pros || "";
                    document.getElementById('contras').value = prod.contras || "";
                    document.getElementById('texto-ia-paste').value = '';

                    editProdId = id;
                    document.getElementById('btn-submit-prod').innerText = "💾 Salvar Edição";
                    window.scrollTo(0, document.getElementById('formProduto').offsetTop - 20);
                }
            });
        }

        function deletarProduto(id) {
            if(confirm("Apagar este produto?")) db.collection("produtos").doc(id).delete();
        }
    </script>
</body>
</html>
